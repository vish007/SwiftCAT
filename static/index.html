<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SwiftCAT Reconciliation</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    .cards { display: flex; gap: 12px; margin-bottom: 20px; }
    .card { border: 1px solid #ddd; padding: 12px; border-radius: 8px; min-width: 140px; }
    table { border-collapse: collapse; width: 100%; margin-top: 12px; }
    td, th { border: 1px solid #ddd; padding: 8px; }
    .wizard { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
    .panel { border: 1px solid #ccc; padding: 10px; border-radius: 8px; margin-top: 14px; }
    .ai-widget { position: fixed; right: 12px; bottom: 12px; width: 320px; }
    .ai-drawer { background: #fff; border: 1px solid #333; padding: 10px; }
    .hidden { display: none; }
    .chip { margin: 2px; }
  </style>
</head>
<body>
  <h1>Reconcile Dashboard</h1>
  <div><a href="/message">Message Detail</a> | <a href="/nostro-ageing">Nostro Ageing</a></div>
  <button onclick="autoRun()">Run Auto-Match</button>
  <div class="cards" id="kpis"></div>

  <h2>Unmatched Queue</h2>
  <table>
    <thead><tr><th>Case</th><th>Ref</th><th>Amount</th><th>Ageing</th><th>Status</th><th>Action</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>

  <h2>Manual Match Wizard</h2>
  <div class="wizard">
    <div class="panel"><h3>Left Message</h3><pre id="left"></pre></div>
    <div class="panel"><h3>Right Message Candidate</h3><pre id="right"></pre></div>
  </div>
  <label>Case ID <input id="caseId"/></label>
  <label>Right Message ID <input id="rightId"/></label>
  <label>Tolerance <input id="tolerance" value="0"/></label>
  <button onclick="confirmManual()">Confirm Manual Match</button>

  <div class="panel">
    <h3>AI Insights Panel</h3>
    <button onclick="aiExplain()">Explain why unmatched</button>
    <button onclick="aiSuggest()">Suggest match candidates</button>
    <button onclick="aiDraftAndApply()">Draft action + user confirm</button>
    <pre id="aiOut"></pre>
  </div>

<script src="/static/ai-widget.js"></script>
<script>
async function loadDashboard(){
  const d = await (await fetch('/reconcile/dashboard')).json();
  document.getElementById('kpis').innerHTML = Object.entries(d).map(([k,v])=>`<div class='card'><strong>${k}</strong><div>${v}</div></div>`).join('');
  const u = await (await fetch('/reconcile/unmatched')).json();
  document.getElementById('rows').innerHTML = u.items.map(r=>`<tr><td>${r.id}</td><td>${r.ref||''}</td><td>${r.amount||''} ${r.currency||''}</td><td>${r.ageing_days}</td><td>${r.status}</td><td><button onclick='showCase(${r.id})'>Load</button></td></tr>`).join('');
}
async function autoRun(){ await fetch('/reconcile/auto-run', {method:'POST'}); await loadDashboard(); }
async function showCase(id){
  const c = await (await fetch(`/reconcile/case/${id}`)).json();
  caseId.value = id;
  document.getElementById('left').textContent = JSON.stringify(c.left, null, 2);
  document.getElementById('right').textContent = JSON.stringify(c.right||{hint:'pick right id'}, null, 2);
}
async function confirmManual(){
  const body = { right_msg_id: Number(rightId.value), user_id:'ui-user', tolerance:Number(tolerance.value)};
  await fetch(`/reconcile/case/${caseId.value}/confirm-match`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
  await loadDashboard();
}
async function aiExplain(){
  const response = await fetch('/ai/explain/unmatched', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({case_id:Number(caseId.value)})}).then(r=>r.json());
  aiOut.textContent = JSON.stringify(response, null, 2);
}
async function aiSuggest(){
  const response = await fetch('/ai/suggest/match-candidates', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({case_id:Number(caseId.value)})}).then(r=>r.json());
  aiOut.textContent = JSON.stringify(response, null, 2);
  if (response.suggestions?.[0]) rightId.value = response.suggestions[0].linked_message_id;
}
async function aiDraftAndApply(){
  const draft = await fetch('/ai/draft/action', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({case_id:Number(caseId.value), action_type:'confirm-match', user_id:'ui-user'})}).then(r=>r.json());
  aiOut.textContent = JSON.stringify(draft, null, 2);
  if (confirm('Apply AI proposed action through business API?')) {
    await fetch(draft.proposed_action.endpoint, {
      method: draft.proposed_action.method,
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(draft.proposed_action.payload)
    });
    await loadDashboard();
  }
}

SwiftAIDrawer.mountWidget('reconcile-dashboard', ['Explain why unmatched', 'Suggest candidate match', 'Draft action']);
loadDashboard();
</script>
</body>
</html>
