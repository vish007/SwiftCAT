<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Message Detail</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    .panel { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    .ai-widget { position: fixed; right: 12px; bottom: 12px; width: 320px; }
    .ai-drawer { background: #fff; border: 1px solid #333; padding: 10px; }
    .hidden { display: none; }
    .chip { margin: 2px; }
  </style>
</head>
<body>
  <a href="/">← Reconcile Dashboard</a>
  <h1>Message Detail (Case-centric)</h1>
  <label>Case ID <input id="caseId" value="1"/></label>
  <button id="load">Load Case</button>
  <div class="panel">
    <h3>Message Context</h3>
    <pre id="messageDetail"></pre>
  </div>
  <div class="panel">
    <h3>AI Insights</h3>
    <button id="explain">Explain why unmatched</button>
    <button id="risk">Run MT700 risk score demo</button>
    <pre id="insights"></pre>
  </div>

  <script src="/static/ai-widget.js"></script>
  <script>
    async function loadCase() {
      const id = Number(caseId.value);
      const payload = await fetch(`/reconcile/case/${id}`).then(r => r.json());
      messageDetail.textContent = JSON.stringify(payload, null, 2);
    }

    load.onclick = loadCase;
    explain.onclick = async () => {
      const id = Number(caseId.value);
      const response = await fetch('/ai/explain/unmatched', {
        method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ case_id: id })
      }).then(r => r.json());
      insights.textContent = JSON.stringify(response, null, 2);
    };

    risk.onclick = async () => {
      const response = await fetch('/ai/risk/score', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ mt_type: '700', text: 'Applicant on SDN watchlist if possible ship via restricted corridor' })
      }).then(r => r.json());
      insights.textContent = JSON.stringify(response, null, 2);
    };

    SwiftAIDrawer.mountWidget('message-detail', ['Explain why unmatched', 'Propose next action', 'Assess sanctions risk']);
    loadCase();
  </script>
</body>
</html>
