openapi: 3.1.0
info:
  title: SwiftCAT API
  version: 0.1.0
servers:
  - url: http://localhost:3000
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200': { description: OK }
  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        '200': { description: Metrics text }
  /messages:
    post:
      summary: Ingest SWIFT message
      parameters:
        - in: header
          name: x-role
          schema: { type: string }
      requestBody:
        required: true
      responses:
        '201': { description: Created }
    get:
      summary: List messages with pagination
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200': { description: Message list }
  /match/{reference}:
    post:
      summary: Run matching pipeline
      parameters:
        - in: path
          name: reference
          required: true
          schema: { type: string }
      responses:
        '200': { description: Match result }
  /exceptions/{id}/close:
    post:
      summary: Close exception case
      responses:
        '200': { description: Closed }
  /audits:
    get:
      summary: Audit trail for sensitive operations
      responses:
        '200': { description: Audit list }
